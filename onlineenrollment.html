<!DOCTYPE html>
<html>
<head>
    <title>Online Course Enrollment Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        form {
            width: 400px;
            margin: auto;
        }
        label {
            font-weight: bold;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<h2 align="center">Online Course Enrollment Form</h2>

<form onsubmit="return validateForm()">
    <label>Student Name:</label><br>
    <input type="text" id="name"><br><br>
    <label>Email:</label><br>
    <input type="text" id="email"><br><br>
    <label>Course Name:</label><br>
    <select id="course">
        <option value="">-- Select Course --</option>
        <option value="Web Development">Web Development</option>
        <option value="Graphic Design">Graphic Design</option>
        <option value="Digital Marketing">Digital Marketing</option>
    </select><br><br>
    <label>Mode of Study:</label><br>
    <input type="radio" name="mode" value="Online"> Online
    <input type="radio" name="mode" value="Offline"> Offline
    <br><br>
    <label>Previous Experience:</label><br>
    <input type="radio" name="experience" value="Yes" onclick="toggleExperience()"> Yes
    <input type="radio" name="experience" value="No" onclick="toggleExperience()"> No
    <br><br>
    <div id="experienceDetails" class="hidden">
        <label>Experience Details:</label><br>
        <textarea id="details" rows="4" cols="40"></textarea><br><br>
    </div>

    <input type="submit" value="Enroll">

</form>

<script>
function toggleExperience() {
    var experience = document.getElementsByName("experience");
    var detailsDiv = document.getElementById("experienceDetails");

    for (var i = 0; i < experience.length; i++) {
        if (experience[i].checked && experience[i].value === "Yes") {
            detailsDiv.style.display = "block";
            return;
        }
    }
    detailsDiv.style.display = "none";
}

function validateForm() {

    var name = document.getElementById("name").value.trim();
    var email = document.getElementById("email").value.trim();
    var course = document.getElementById("course").value;
    var mode = document.getElementsByName("mode");
    var experience = document.getElementsByName("experience");
    var details = document.getElementById("details").value.trim();

    var emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (name === "") {
        alert("Student Name is required.");
        return false;
    }

    if (email === "") {
        alert("Email is required.");
        return false;
    }

    if (!email.match(emailPattern)) {
        alert("Please enter a valid email address.");
        return false;
    }

    if (course === "") {
        alert("Please select a course.");
        return false;
    }

    var modeSelected = false;
    for (var i = 0; i < mode.length; i++) {
        if (mode[i].checked) {
            modeSelected = true;
        }
    }

    if (!modeSelected) {
        alert("Please select mode of study.");
        return false;
    }

    var experienceSelected = "";
    for (var i = 0; i < experience.length; i++) {
        if (experience[i].checked) {
            experienceSelected = experience[i].value;
        }
    }

    if (experienceSelected === "") {
        alert("Please select previous experience option.");
        return false;
    }

    if (experienceSelected === "Yes" && details === "") {
        alert("Please provide experience details.");
        return false;
    }

    alert("Enrollment Successful!");
    return true;
}
</script>

</body>
</html>

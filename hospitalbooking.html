<!DOCTYPE html>
<html>
<head>
    <title>Hospital Appointment Booking Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        form {
            width: 400px;
            margin: auto;
        }
        label {
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2 align="center">Hospital Appointment Booking Form</h2>

<form onsubmit="return validateForm()">
    <label>Patient Name:</label><br>
    <input type="text" id="name"><br><br>
    <label>Age:</label><br>
    <input type="number" id="age"><br><br>
    <label>Phone Number:</label><br>
    <input type="text" id="phone"><br><br>
    <label>Department:</label><br>
    <select id="department">
        <option value=""> Select Department</option>
        <option value="General Medicine">General Medicine</option>
        <option value="Cardiology">Cardiology</option>
        <option value="Orthopedics">Orthopedics</option>
        <option value="Pediatrics">Pediatrics</option>
        <option value="Opthalmology">Opthalmology</option>
        <option value="Gynacology">Gynacology</option>
         
    </select><br><br>
    <label>Appointment Date:</label><br>
    <input type="date" id="date"><br><br>
    <label>Time Slot:</label><br>
    <select id="time">
        <option value=""> Select Time Slot</option>
        <option value="9AM - 10AM">9AM - 10AM</option>
        <option value="10AM - 11AM">10AM - 11AM</option>
        <option value="11AM - 12PM">11AM - 12PM</option>
        <option value="2PM - 3PM">2PM - 3PM</option>
    </select><br><br>

    <input type="submit" value="Book Appointment">

</form>

<script>
function validateForm() {

    var name = document.getElementById("name").value.trim();
    var age = document.getElementById("age").value;
    var phone = document.getElementById("phone").value.trim();
    var department = document.getElementById("department").value;
    var date = document.getElementById("date").value;
    var time = document.getElementById("time").value;

    var namePattern = /^[A-Za-z ]+$/;
    var phonePattern = /^(98|97)\d{8}$/;
    if (name === "") {
        alert("Patient name is required.");
        return false;
    }

    if (!name.match(namePattern)) {
        alert("Name must contain letters only.");
        return false;
    }
    if (age === "" || age <= 0) {
        alert("Age must be greater than 0.");
        return false;
    }
    if (!phone.match(phonePattern)) {
        alert("Phone number must be 10 digits and start with 98 or 97.");
        return false;
    }
    if (department === "") {
        alert("Please select a department.");
        return false;
    }
    if (date === "") {
        alert("Please select appointment date.");
        return false;
    }

    var today = new Date();
    var selectedDate = new Date(date);
    today.setHours(0,0,0,0);

    if (selectedDate < today) {
        alert("Appointment date cannot be in the past.");
        return false;
    }
    if (time === "") {
        alert("Please select a time slot.");
        return false;
    }

    alert("Appointment booked successfully for " + name + "!");
    return true;
}
</script>

</body>
</html>
